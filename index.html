<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'">
    <title>KeyDates</title>
    <style>
        @font-face{font-family:'Inter';font-style:normal;font-weight:200;font-display:swap;src:url(fonts/inter-200.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:300;font-display:swap;src:url(fonts/inter-300.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/inter-400.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url(fonts/inter-500.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/inter-600.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url(fonts/inter-700.woff2) format('woff2')}
    </style>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8f6f2;
            --card-bg: rgba(255,255,255,0.82);
            --card-border: rgba(220,210,200,0.35);
            --ink: #3d322a;
            --muted: #b0a090;
            --mono: 'JetBrains Mono', monospace;
            --font: 'Inter', -apple-system, sans-serif;
            --g1: #f472b6;
            --g2: #818cf8;
            --g3: #34d399;
            --g1-dim: rgba(244,114,182,0.12);
            --g2-dim: rgba(129,140,248,0.12);
            --g3-dim: rgba(52,211,153,0.12);
            --card-radius: 20px;
        }
        html { font-size: 16px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(244,114,182,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(129,140,248,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(52,211,153,0.04) 0%, transparent 50%);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .orb-1 {
            width: 280px; height: 280px;
            background: rgba(244,114,182,0.12);
            top: -120px; left: -60px;
            animation: floatA 8s ease-in-out infinite;
        }
        .orb-2 {
            width: 200px; height: 200px;
            background: rgba(129,140,248,0.10);
            bottom: -80px; right: -40px;
            animation: floatB 10s ease-in-out infinite;
        }
        .orb-3 {
            width: 180px; height: 180px;
            background: rgba(52,211,153,0.08);
            top: 60%; left: 55%;
            animation: floatC 12s ease-in-out infinite;
        }
        @keyframes floatA {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(40px,30px) scale(1.1); }
            66% { transform: translate(-20px,50px) scale(0.9); }
        }
        @keyframes floatB {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(-30px,-20px) scale(1.15); }
            66% { transform: translate(20px,-40px) scale(0.9); }
        }
        @keyframes floatC {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-40px,-30px) scale(1.2); }
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 28px;
            text-align: center;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            display: flex;
            gap: 24px;
            width: 100%;
            max-width: 840px;
            align-items: stretch;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        /* ── Left: Countdown Cards ── */
        .left-panel {
            flex: 1;
            min-width: 240px;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .cd-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--card-radius);
            padding: 14px 18px;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
        }
        .cd-card:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 30px rgba(180,150,220,0.12);
        }
        .cd-card .cd-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            flex-shrink: 0;
            min-width: 64px;
        }
        .cd-card.cd-0 .cd-label { color: var(--g1); }
        .cd-card.cd-1 .cd-label { color: var(--g2); }
        .cd-card.cd-2 .cd-label { color: var(--g3); }

        .cd-card .cd-count {
            font-family: var(--mono);
            font-size: 28px;
            font-weight: 300;
            line-height: 1.3;
            text-align: center;
            flex: 1;
        }
        .cd-card.cd-0 .cd-count { background: linear-gradient(135deg, #f9a8d4, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .cd-card.cd-1 .cd-count { background: linear-gradient(135deg, #a5b4fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .cd-card.cd-2 .cd-count { background: linear-gradient(135deg, #6ee7b7, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .cd-card .cd-count .unit {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.6;
        }
        .cd-card .cd-date {
            font-size: 12px;
            flex-shrink: 0;
            text-align: right;
            min-width: 80px;
        }
        .cd-card.cd-0 .cd-date { color: rgba(180,100,140,0.7); }
        .cd-card.cd-1 .cd-date { color: rgba(100,110,200,0.7); }
        .cd-card.cd-2 .cd-date { color: rgba(40,160,110,0.7); }

        /* ── Right: Calendar ── */
        .right-panel {
            flex: 1.3;
            min-width: 300px;
            max-width: 480px;
            display: flex;
            align-items: stretch;
        }
        .cal-card {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--card-radius);
            padding: 22px;
            transition: box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        .cal-card:hover {
            box-shadow: 0 8px 30px rgba(180,150,220,0.10);
        }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .cal-header .cal-month-year {
            font-size: 15px;
            font-weight: 500;
            color: var(--ink);
        }
        .cal-header .cal-nav {
            display: flex;
            gap: 4px;
        }
        .cal-header .cal-nav button {
            background: rgba(60,50,40,0.04);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            color: var(--muted);
            font-family: var(--font);
            font-size: 16px;
            transition: all 0.2s;
        }
        .cal-header .cal-nav button:hover {
            background: rgba(129,140,248,0.12);
            color: var(--g2);
            border-color: rgba(129,140,248,0.25);
        }

        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 4px;
        }
        .cal-weekdays .wd {
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            padding: 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .cal-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .cal-days .cal-day {
            text-align: center;
            padding: 9px 0;
            font-size: 13px;
            font-weight: 400;
            color: var(--ink);
            border-radius: 10px;
            transition: all 0.15s;
            cursor: default;
        }
        .cal-days .cal-day.other-month {
            color: rgba(180,170,160,0.4);
        }
        .cal-days .cal-day.today {
            background: rgba(129,140,248,0.12);
            font-weight: 600;
            color: var(--g2);
            box-shadow: inset 0 0 0 1px rgba(129,140,248,0.25);
        }
        .cal-days .cal-day.highlight {
            background: linear-gradient(135deg, rgba(244,114,182,0.25), rgba(244,114,182,0.15));
            color: #f9a8d4;
            font-weight: 600;
        }
        .cal-days .cal-day.highlight-1 {
            background: linear-gradient(135deg, rgba(129,140,248,0.25), rgba(129,140,248,0.15));
            color: #a5b4fc;
            font-weight: 600;
        }
        .cal-days .cal-day.highlight-2 {
            background: linear-gradient(135deg, rgba(52,211,153,0.25), rgba(52,211,153,0.15));
            color: #6ee7b7;
            font-weight: 600;
        }

        .cal-legend {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .cal-legend .leg-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--muted);
        }
        .cal-legend .leg-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .cal-legend .leg-dot.dot-0 { background: var(--g1); }
        .cal-legend .leg-dot.dot-1 { background: var(--g2); }
        .cal-legend .leg-dot.dot-2 { background: var(--g3); }

        /* Fade-in animation on load */
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .cd-card { animation: fadeSlide 0.6s ease-out both; }
        .cd-card:nth-child(1) { animation-delay: 0.05s; }
        .cd-card:nth-child(2) { animation-delay: 0.15s; }
        .cd-card:nth-child(3) { animation-delay: 0.25s; }
        .cal-card { animation: fadeSlide 0.6s ease-out 0.35s both; }

        @media (max-width: 660px) {
            body { padding: 20px 14px; }
            .container { flex-direction: column; align-items: center; }
            .left-panel, .right-panel { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="page-title">Key Dates</div>

    <div class="container">
        <!-- Left: Countdown -->
        <div class="left-panel" id="cdPanel"></div>

        <!-- Right: Calendar -->
        <div class="right-panel">
            <div class="cal-card">
                <div class="cal-header">
                    <span class="cal-month-year" id="calMonthYear"></span>
                    <div class="cal-nav">
                        <button id="calPrev">&larr;</button>
                        <button id="calNext">&rarr;</button>
                    </div>
                </div>
                <div class="cal-grid">
                <div class="cal-weekdays">
                    <span class="wd">S</span><span class="wd">M</span><span class="wd">T</span>
                    <span class="wd">W</span><span class="wd">T</span><span class="wd">F</span>
                    <span class="wd">S</span>
                </div>
                <div class="cal-days" id="calDays"></div>
                <div class="cal-legend" id="calLegend"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ── Obfuscated date data (encoded: [yearOffset, month, day]) ──
        var _d = [
            [0, 6, 9],
            [0, 7, 7],
            [0, 10, 6]
        ];

        var keyDates = _d.map(function(a) {
            return { year: 2026 + a[0], month: a[1], day: a[2] };
        });

        var labels = ['Date A', 'Date B', 'Date C'];
        var colors = ['highlight', 'highlight-1', 'highlight-2'];
        var dotColors = ['dot-0', 'dot-1', 'dot-2'];

        var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        var monthShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        function daysBetween(from, to) {
            return Math.round((to.getTime() - from.getTime()) / 86400000);
        }

        function nextOccurrence(kd, today) {
            var d = new Date(today.getFullYear(), kd.month - 1, kd.day);
            if (d < today) d = new Date(today.getFullYear() + 1, kd.month - 1, kd.day);
            return d;
        }

        // ── Render Countdowns ──
        function renderCountdowns() {
            var today = new Date();
            today.setHours(0,0,0,0);

            var html = '';
            for (var i = 0; i < keyDates.length; i++) {
                var kd = keyDates[i];
                var next = nextOccurrence(kd, today);
                var diff = daysBetween(today, next);
                var diffStr, unit;
                if (diff === 0) {
                    diffStr = 'Today';
                    unit = '';
                } else if (diff === 1) {
                    diffStr = '1';
                    unit = 'day';
                } else {
                    diffStr = String(diff);
                    unit = 'days';
                }
                var dateStr = monthShort[kd.month - 1] + ' ' + kd.day;
                html +=
                    '<div class="cd-card cd-' + i + '">' +
                        '<div class="cd-label">' + labels[i] + '</div>' +
                        '<div class="cd-count">' + diffStr + ' <span class="unit">' + unit + '</span></div>' +
                        '<div class="cd-date">' + dateStr + '</div>' +
                    '</div>';
            }
            document.getElementById('cdPanel').innerHTML = html;
        }

        // ── Calendar ──
        var calView = { year: 2026, month: 5 };

        function renderCalendar() {
            var y = calView.year;
            var m = calView.month;

            document.getElementById('calMonthYear').textContent = monthNames[m] + ' ' + y;

            var firstDay = new Date(y, m, 1).getDay();
            var daysInMonth = new Date(y, m + 1, 0).getDate();
            var daysInPrev = new Date(y, m, 0).getDate();

            var today = new Date();
            today.setHours(0,0,0,0);

            var hl = {};
            for (var i = 0; i < keyDates.length; i++) {
                var kd = keyDates[i];
                var key = (kd.month - 1) + '-' + kd.day;
                if (!hl[key]) hl[key] = colors[i];
            }

            var html = '';
            var start = firstDay;
            for (var p = daysInPrev - start + 1; p <= daysInPrev; p++) {
                html += '<div class="cal-day other-month">' + p + '</div>';
            }
            for (var d = 1; d <= daysInMonth; d++) {
                var cls = 'cal-day';
                var date = new Date(y, m, d);
                if (date.getTime() === today.getTime()) cls += ' today';
                var hkey = m + '-' + d;
                if (hl[hkey]) cls += ' ' + hl[hkey];
                html += '<div class="' + cls + '">' + d + '</div>';
            }
            var totalCells = start + daysInMonth;
            var rem = (7 - (totalCells % 7)) % 7;
            for (var n = 1; n <= rem; n++) {
                html += '<div class="cal-day other-month">' + n + '</div>';
            }
            document.getElementById('calDays').innerHTML = html;

            var legendHtml = '';
            for (var i = 0; i < keyDates.length; i++) {
                var kd = keyDates[i];
                legendHtml +=
                    '<div class="leg-item">' +
                        '<span class="leg-dot ' + dotColors[i] + '"></span>' +
                        labels[i] + ': ' + monthShort[kd.month - 1] + ' ' + kd.day +
                    '</div>';
            }
            document.getElementById('calLegend').innerHTML = legendHtml;
        }

        document.getElementById('calPrev').addEventListener('click', function() {
            calView.month--;
            if (calView.month < 0) { calView.month = 11; calView.year--; }
            renderCalendar();
        });
        document.getElementById('calNext').addEventListener('click', function() {
            calView.month++;
            if (calView.month > 11) { calView.month = 0; calView.year++; }
            renderCalendar();
        });

        renderCountdowns();
        renderCalendar();
    })();
    </script>
</body>
</html>
