<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'">
    <title>KeyDates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #faf9f7; color: #2c2c2e; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 50% 35% at 25% 0%, rgba(255,149,0,0.06) 0%, transparent 60%), radial-gradient(ellipse 40% 30% at 75% 100%, rgba(255,55,95,0.04) 0%, transparent 50%); }
        .shell { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 40px 24px 64px; }
        .header { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .header-icon { font-size: 24px; margin-bottom: 10px; }
        .header-title { font-size: 12px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: #c47a3a; }
        .time-bar { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 16px; }
        .tb-clock { font-size: 32px; font-weight: 200; color: #1c1c1e; font-variant-numeric: tabular-nums; letter-spacing: 1px; line-height: 1; }
        .tb-divider { width: 1px; height: 32px; background: rgba(0,0,0,0.08); }
        .tb-date { text-align: left; }
        .tb-ymd { font-size: 13px; font-weight: 400; color: #3a3a3c; font-variant-numeric: tabular-nums; }
        .tb-weekday { font-size: 11px; color: #8e8e93; margin-top: 2px; letter-spacing: 1px; }
        .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
        .cards-col { display: flex; flex-direction: column; gap: 10px; }
        .card { background: #fff; border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); transition: transform 0.25s ease, box-shadow 0.25s ease; cursor: default; opacity: 0; transform: translateX(-12px); animation: cardIn .5s ease-out forwards; position: relative; overflow: hidden; }
        .card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 14px 0 0 14px; opacity: 0.7; }
        .card:hover { transform: translateX(-2px) translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.05), 0 12px 32px rgba(0,0,0,0.04); }
        .card:nth-child(1) { animation-delay: .1s } .card:nth-child(2) { animation-delay: .18s } .card:nth-child(3) { animation-delay: .26s } .card:nth-child(4) { animation-delay: .34s }
        .card.coral::after { background: linear-gradient(180deg, #ff6b6b, #ff8e8e); }
        .card.lavender::after { background: linear-gradient(180deg, #a78bfa, #c4b5fd); }
        .card.amber::after { background: linear-gradient(180deg, #f59e0b, #fbbf24); }
        .card.sage::after { background: linear-gradient(180deg, #6ee7b7, #a7f3d0); }
        @keyframes cardIn { to { opacity: 1; transform: translateX(0); } }
        .date-circle { width: 46px; height: 46px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .date-circle::before { content: ''; position: absolute; inset: -2px; border-radius: 50%; opacity: 0.12; }
        .coral .date-circle { background: #fff0f0; } .coral .date-circle::before { border: 2px solid #ff6b6b; }
        .lavender .date-circle { background: #f5f3ff; } .lavender .date-circle::before { border: 2px solid #a78bfa; }
        .amber .date-circle { background: #fffbeb; } .amber .date-circle::before { border: 2px solid #f59e0b; }
        .sage .date-circle { background: #ecfdf5; } .sage .date-circle::before { border: 2px solid #6ee7b7; }
        .dc-emoji { font-size: 12px; line-height: 1; }
        .dc-day { font-size: 16px; font-weight: 600; line-height: 1; margin-top: 1px; }
        .coral .dc-day { color: #d63031; } .lavender .dc-day { color: #6d28d9; } .amber .dc-day { color: #b45309; } .sage .dc-day { color: #047857; }
        .info { flex: 1; min-width: 0; }
        .info-title { font-size: 13px; font-weight: 500; color: #1c1c1e; }
        .info-sub { font-size: 10px; color: #8e8e93; margin-top: 2px; }
        .countdown { text-align: right; flex-shrink: 0; }
        .cd-num { font-size: 22px; font-weight: 200; font-variant-numeric: tabular-nums; line-height: 1; }
        .cd-lbl { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
        .coral .cd-num { color: #e04848; } .coral .cd-lbl { color: #e08080; }
        .lavender .cd-num { color: #7c3aed; } .lavender .cd-lbl { color: #a78bfa; }
        .amber .cd-num { color: #d97706; } .amber .cd-lbl { color: #fbbf24; }
        .sage .cd-num { color: #059669; } .sage .cd-lbl { color: #6ee7b7; }
        .card.today-card { border: 1.5px solid rgba(255,149,0,0.2); background: linear-gradient(135deg, #fff 60%, #fff8f0); }
        .today-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 16px; background: linear-gradient(135deg, #ff9500, #ff6b6b); color: #fff; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .today-dot { width: 4px; height: 4px; border-radius: 50%; background: #fff; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
        .calendar-wrap { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); opacity: 0; transform: translateX(12px); animation: calIn .5s .2s ease-out forwards; }
        @keyframes calIn { to { opacity: 1; transform: translateX(0); } }
        .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .cal-nav { width: 30px; height: 30px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); background: #faf9f7; color: #3a3a3c; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
        .cal-nav:hover { background: #f0eff0; border-color: rgba(0,0,0,0.1); }
        .cal-month-year { font-size: 14px; font-weight: 500; color: #1c1c1e; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cal-weekday { text-align: center; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #aeaeb2; padding: 6px 0; }
        .cal-day { text-align: center; padding: 7px 0; font-size: 13px; font-weight: 400; color: #3a3a3c; border-radius: 8px; cursor: pointer; transition: all 0.15s; position: relative; }
        .cal-day:hover { background: #f5f5f7; }
        .cal-day.empty { cursor: default; } .cal-day.empty:hover { background: none; }
        .cal-day.today { background: linear-gradient(135deg, #ff9500, #ff6b6b); color: #fff; font-weight: 600; }
        .cal-day.today:hover { opacity: 0.9; }
        .cal-day.selected { background: #1c1c1e; color: #fff; font-weight: 500; }
        .cal-day.keydate::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: #c47a3a; }
        .cal-day.today.keydate::after { background: #fff; }
        .cal-day.other-month { color: #d1d1d6; }
        .selected-info { text-align: center; padding: 12px; min-height: 40px; margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.03); font-size: 12px; color: #8e8e93; }
        .selected-info .si-date { font-weight: 500; color: #3a3a3c; font-size: 13px; }
        .selected-info .si-note { margin-top: 2px; color: #c47a3a; font-weight: 500; }
        .footer { text-align: center; margin-top: 40px; font-size: 10px; color: #c7c7cc; letter-spacing: 2px; text-transform: uppercase; }
        @media (max-width: 720px) { .main-layout { grid-template-columns: 1fr; } .cards-col { flex-direction: row; overflow-x: auto; gap: 8px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; } .card { min-width: 240px; flex-shrink: 0; } }
        @media (max-width: 480px) { .card { min-width: 220px; padding: 14px; gap: 10px; } .cd-num { font-size: 18px; } .tb-clock { font-size: 26px; } }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="shell">
    <div class="header">
        <div class="header-icon">📌</div>
        <div class="header-title">KeyDates</div>
        <div class="time-bar">
            <div class="tb-clock" id="clock">--:--:--</div>
            <div class="tb-divider"></div>
            <div class="tb-date">
                <div class="tb-ymd" id="ymd">----/--/--</div>
                <div class="tb-weekday" id="weekday">---</div>
            </div>
        </div>
    </div>
    <div class="main-layout">
        <div class="cards-col" id="cards"></div>
        <div class="calendar-wrap">
            <div class="cal-header">
                <button class="cal-nav" id="cal-prev">‹</button>
                <div class="cal-month-year" id="cal-title"></div>
                <button class="cal-nav" id="cal-next">›</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <div class="selected-info" id="selected-info"></div>
        </div>
    </div>
    <div class="footer">KeyDates</div>
</div>

<script>
(function() {
    'use strict';

    // ── Obfuscated key dates (Base64: month-day pairs) ──
    function _kd(b) { var p = atob(b).split('-'); return { month: parseInt(p[0],10), day: parseInt(p[1],10) }; }
    var _k = [
        _kd('NC0xNg=='),  // 4-16
        _kd('Ni05'),      // 6-9
        _kd('Ny03'),      // 7-7
        _kd('MTAtNg==')   // 10-6
    ];
    var STYLES = ['coral','lavender','amber','sage'];
    var EMOJIS = ['🌸','💜','✨','🍂'];
    var TITLES = ['April 16','June 9','July 7','October 6'];

    // Build DATES array from obfuscated data
    var DATES = _k.map(function(k, i) {
        return { month: k.month, day: k.day, title: TITLES[i], emoji: EMOJIS[i], style: STYLES[i] };
    });

    var WEEKDAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    var WEEKDAYS_FULL = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function pad(n) { return String(n).padStart(2, '0'); }
    function isKeyDate(m, d) { return DATES.some(function(k) { return k.month === m && k.day === d; }); }
    function daysUntil(m, d) {
        var now = new Date();
        var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        var target = new Date(now.getFullYear(), m - 1, d);
        if (target <= today) target = new Date(now.getFullYear() + 1, m - 1, d);
        return Math.round((target - today) / 86400000);
    }
    function mondayIndex(d) { return (d.getDay() + 6) % 7; }

    // Cached DOM refs
    var elClock = document.getElementById('clock');
    var elYmd = document.getElementById('ymd');
    var elWeekday = document.getElementById('weekday');
    var elCards = document.getElementById('cards');
    var elCalGrid = document.getElementById('cal-grid');
    var elCalTitle = document.getElementById('cal-title');
    var elSelectedInfo = document.getElementById('selected-info');

    // ── Time ──
    var timer = setInterval(updateTime, 1000);
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) { clearInterval(timer); timer = null; }
        else { updateTime(); timer = setInterval(updateTime, 1000); }
    });
    window.addEventListener('beforeunload', function() { clearInterval(timer); });
    updateTime();

    function updateTime() {
        var now = new Date();
        elClock.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
        elYmd.textContent = now.getFullYear() + '/' + pad(now.getMonth()+1) + '/' + pad(now.getDate());
        elWeekday.textContent = WEEKDAYS_FULL[now.getDay()];
    }

    // ── Calendar (event delegation) ──
    var calYear, calMonth, selectedDate = null;

    elCalGrid.addEventListener('click', function(e) {
        var el = e.target;
        if (!el.classList.contains('cal-day') || el.classList.contains('empty')) return;
        var d = parseInt(el.textContent, 10);
        if (isNaN(d)) return;
        selectedDate = { year: calYear, month: calMonth, day: d };
        renderCalendar();
        showSelectedInfo(calMonth + 1, d);
    });

    function renderCalendar() {
        var frag = document.createDocumentFragment();
        elCalTitle.textContent = MONTHS[calMonth] + ' ' + calYear;

        WEEKDAYS.forEach(function(w) {
            var el = document.createElement('div');
            el.className = 'cal-weekday'; el.textContent = w;
            frag.appendChild(el);
        });

        var firstDay = mondayIndex(new Date(calYear, calMonth, 1));
        var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        var daysInPrev = new Date(calYear, calMonth, 0).getDate();
        var today = new Date();
        var todayStr = today.getFullYear() + '-' + today.getMonth() + '-' + today.getDate();

        for (var i = firstDay - 1; i >= 0; i--) {
            var el = document.createElement('div');
            el.className = 'cal-day other-month empty'; el.textContent = daysInPrev - i;
            frag.appendChild(el);
        }

        for (var d = 1; d <= daysInMonth; d++) {
            var el = document.createElement('div');
            el.className = 'cal-day'; el.textContent = d;
            var m = calMonth + 1;
            var dateStr = calYear + '-' + calMonth + '-' + d;
            if (dateStr === todayStr) el.classList.add('today');
            if (isKeyDate(m, d)) el.classList.add('keydate');
            if (selectedDate && selectedDate.year === calYear && selectedDate.month === calMonth && selectedDate.day === d) el.classList.add('selected');
            frag.appendChild(el);
        }

        var totalCells = firstDay + daysInMonth;
        var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (var d = 1; d <= remaining; d++) {
            var el = document.createElement('div');
            el.className = 'cal-day other-month empty'; el.textContent = d;
            frag.appendChild(el);
        }

        elCalGrid.innerHTML = '';
        elCalGrid.appendChild(frag);

        if (selectedDate) showSelectedInfo(selectedDate.month + 1, selectedDate.day);
        else elSelectedInfo.innerHTML = '';
    }

    function showSelectedInfo(m, d) {
        var kd = null;
        for (var i = 0; i < DATES.length; i++) { if (DATES[i].month === m && DATES[i].day === d) { kd = DATES[i]; break; } }
        if (kd) {
            var left = daysUntil(m, d);
            var isToday = left === 0;
            // Build with DOM API (no innerHTML)
            elSelectedInfo.innerHTML = '';
            var div1 = document.createElement('div');
            div1.className = 'si-date';
            div1.textContent = kd.emoji + ' ' + kd.title;
            var div2 = document.createElement('div');
            div2.className = 'si-note';
            div2.textContent = isToday ? '✦ Today!' : left + ' days until this day';
            elSelectedInfo.appendChild(div1);
            elSelectedInfo.appendChild(div2);
        } else {
            var dt = new Date(selectedDate.year, selectedDate.month, selectedDate.day);
            elSelectedInfo.innerHTML = '';
            var div = document.createElement('div');
            div.className = 'si-date';
            div.textContent = MONTHS[selectedDate.month] + ' ' + selectedDate.day + ', ' + selectedDate.year + ' — ' + WEEKDAYS_FULL[dt.getDay()];
            elSelectedInfo.appendChild(div);
        }
    }

    document.getElementById('cal-prev').addEventListener('click', function() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
    document.getElementById('cal-next').addEventListener('click', function() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });

    var now = new Date();
    calYear = now.getFullYear(); calMonth = now.getMonth();
    renderCalendar();

    // ── Cards (DocumentFragment) ──
    function renderCards() {
        var frag = document.createDocumentFragment();
        DATES.forEach(function(d) {
            var left = daysUntil(d.month, d.day);
            var isToday = left === 0;
            var card = document.createElement('div');
            card.className = 'card ' + d.style + (isToday ? ' today-card' : '');

            var circle = document.createElement('div');
            circle.className = 'date-circle';
            var emoji = document.createElement('div');
            emoji.className = 'dc-emoji'; emoji.textContent = d.emoji;
            var day = document.createElement('div');
            day.className = 'dc-day'; day.textContent = d.day;
            circle.appendChild(emoji); circle.appendChild(day);

            var info = document.createElement('div');
            info.className = 'info';
            var title = document.createElement('div');
            title.className = 'info-title'; title.textContent = d.title;
            var sub = document.createElement('div');
            sub.className = 'info-sub'; sub.textContent = isToday ? 'Have a wonderful day!' : 'Mark your calendar';
            info.appendChild(title); info.appendChild(sub);

            var countdown = document.createElement('div');
            countdown.className = 'countdown';
            var cdNum = document.createElement('div');
            cdNum.className = 'cd-num'; cdNum.textContent = isToday ? '✦' : left;
            var cdLbl = document.createElement('div');
            cdLbl.className = 'cd-lbl'; cdLbl.textContent = isToday ? 'today' : 'days left';
            countdown.appendChild(cdNum); countdown.appendChild(cdLbl);

            if (isToday) {
                var badge = document.createElement('div');
                badge.style.marginTop = '4px';
                var span = document.createElement('span');
                span.className = 'today-badge';
                var dot = document.createElement('span');
                dot.className = 'today-dot';
                span.appendChild(dot);
                span.appendChild(document.createTextNode('Today'));
                badge.appendChild(span);
                countdown.appendChild(badge);
            }

            card.appendChild(circle); card.appendChild(info); card.appendChild(countdown);
            frag.appendChild(card);
        });
        elCards.innerHTML = '';
        elCards.appendChild(frag);
    }
    renderCards();
    setInterval(renderCards, 60000);
})();
</script>

</body>
</html>
