<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="permissions-policy" content="camera=(), microphone=(), geolocation=()">
    <title>KeyDates</title>
    <style>
        /* Self-hosted fonts (no external requests) */
        @font-face{font-family:'Inter';font-style:normal;font-weight:200;font-display:swap;src:url(fonts/inter-200.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:300;font-display:swap;src:url(fonts/inter-300.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/inter-400.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url(fonts/inter-500.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/inter-600.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url(fonts/inter-700.woff2) format('woff2')}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:300;font-display:swap;src:url(fonts/jbm-300.woff2) format('woff2')}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/jbm-400.woff2) format('woff2')}
        @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;font-display:swap;src:url(fonts/jbm-500.woff2) format('woff2')}
    </style>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a28;
            --ink: #e4e4ed;
            --muted: #6b6b80;
            --border: rgba(255,255,255,0.06);
            --accent: #7c5cfc;
            --accent2: #f472b6;
            --accent3: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --mono: 'JetBrains Mono', monospace;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface2);
            color: var(--ink);
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }
        .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: #8b6ffc; border-color: #8b6ffc; }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border-color: rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.1); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* Content */
        .container {
            max-width: 880px;
            margin: 0 auto;
            padding: 32px 20px 80px;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
        }
        .stat-card .num {
            font-family: var(--mono);
            font-size: 26px;
            font-weight: 500;
            color: var(--accent3);
        }
        .stat-card .label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* Add form */
        .add-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 28px;
        }
        .add-card h3 {
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
        }
        .add-form .field {
            flex: 1;
            min-width: 140px;
        }
        .add-form .field label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .add-form input, .add-form select {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }
        .add-form input:focus, .add-form select:focus {
            border-color: var(--accent);
        }
        .add-form select { cursor: pointer; }
        .add-form .btn-primary {
            align-self: flex-end;
            padding: 8px 22px;
        }

        /* Date list */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .list-header h2 {
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .list-header .count {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--muted);
        }

        .date-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.15s;
        }
        .date-card:hover { border-color: rgba(255,255,255,0.1); }
        .date-card.today {
            border-color: rgba(124,92,252,0.3);
            background: linear-gradient(135deg, rgba(124,92,252,0.06), transparent);
        }
        .date-card.upcoming {
            border-left: 3px solid var(--accent3);
        }
        .date-card.past {
            opacity: 0.5;
        }
        .date-card.past:hover { opacity: 0.7; }

        .date-card .day-badge {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            border-radius: 10px;
            background: var(--surface2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
        }
        .date-card .day-badge .month {
            font-size: 10px;
            color: var(--accent2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            line-height: 1;
        }
        .date-card .day-badge .day {
            font-size: 20px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.2;
        }

        .date-card .info {
            flex: 1;
            min-width: 0;
        }
        .date-card .info .name {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .date-card .info .desc {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }
        .date-card .info .category-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .tag-birthday { background: rgba(244,114,182,0.15); color: var(--accent2); }
        .tag-anniversary { background: rgba(124,92,252,0.15); color: var(--accent); }
        .tag-holiday { background: rgba(56,189,248,0.15); color: var(--accent3); }
        .tag-other { background: rgba(255,255,255,0.06); color: var(--muted); }

        .date-card .meta-right {
            flex-shrink: 0;
            text-align: right;
        }
        .date-card .meta-right .countdown {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--accent3);
        }
        .date-card .meta-right .countdown.negative {
            color: var(--danger);
        }
        .date-card .meta-right .delete-btn {
            display: inline-block;
            margin-top: 4px;
            font-size: 11px;
            color: var(--danger);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
            background: none;
            border: none;
            font-family: inherit;
        }
        .date-card:hover .meta-right .delete-btn {
            opacity: 0.6;
        }
        .date-card .meta-right .delete-btn:hover { opacity: 1 !important; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state .icon {
            font-size: 36px;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .empty-state p {
            color: var(--muted);
            font-size: 14px;
        }

        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px 30px;
            max-width: 400px;
            width: 90%;
        }
        .modal h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 14px;
        }
        .modal p {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            pointer-events: none;
        }
        .toast {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 13px;
            color: var(--ink);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.25s ease;
            pointer-events: auto;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* Search */
        .search-bar {
            margin-bottom: 18px;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-bar input:focus {
            border-color: var(--accent);
        }
        .search-bar input::placeholder {
            color: var(--muted);
        }

        /* Category filter pills */
        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }
        .pill {
            font-size: 11px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .pill:hover { border-color: rgba(255,255,255,0.15); }
        .pill.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header { padding: 14px 16px; }
            .container { padding: 20px 14px 60px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .add-form .field { min-width: 100%; }
            .date-card { flex-wrap: wrap; gap: 10px; }
            .date-card .meta-right { width: 100%; text-align: left; display: flex; gap: 12px; align-items: center; }
            .date-card .meta-right .delete-btn { opacity: 0.4; }
            .modal { padding: 22px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <span class="logo">KeyDates</span>
        <div class="header-actions">
            <button class="btn" onclick="exportData()">Export</button>
            <label class="btn" style="cursor:pointer">
                Import
                <input type="file" accept=".json" style="display:none" onchange="importData(event)">
            </label>
        </div>
    </header>

    <div class="container">
        <!-- Stats -->
        <div class="stats-row" id="statsRow"></div>

        <!-- Add card -->
        <div class="add-card">
            <h3>Add New Date</h3>
            <form class="add-form" onsubmit="addDate(event)">
                <div class="field">
                    <label>Name</label>
                    <input type="text" id="newName" placeholder="e.g. Alice Birthday" required>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input type="date" id="newDate" required>
                </div>
                <div class="field" style="min-width:100px">
                    <label>Category</label>
                    <select id="newCategory">
                        <option value="birthday">Birthday</option>
                        <option value="anniversary">Anniversary</option>
                        <option value="holiday">Holiday</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Add</button>
            </form>
        </div>

        <!-- Search / filter -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search dates..." oninput="render()">
        </div>
        <div class="filter-pills" id="filterPills"></div>

        <!-- Date list -->
        <div class="list-header">
            <h2>All Dates</h2>
            <span class="count" id="dateCount"></span>
        </div>
        <div id="dateList"></div>
    </div>

    <!-- Confirm modal -->
    <div class="modal-overlay" id="confirmOverlay">
        <div class="modal">
            <h3 id="confirmTitle">Confirm</h3>
            <p id="confirmText">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn" onclick="closeConfirm()">Cancel</button>
                <button class="btn btn-danger" id="confirmBtn" onclick="confirmAction()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        /* ── Data ── */
        const STORAGE_KEY = 'keydates_data';
        let dates = [];

        // Load
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) dates = JSON.parse(raw);
            } catch(e) { dates = []; }
            // Prefill with defaults if empty
            if (dates.length === 0) {
                const today = new Date();
                const y = today.getFullYear();
                dates = [
                    { id: 'd1', name: 'New Year', date: `${y}-01-01`, category: 'holiday' },
                    { id: 'd2', name: 'Christmas', date: `${y}-12-25`, category: 'holiday' },
                ];
                saveData();
            }
        }
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dates));
        }

        /* ── Helpers ── */
        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
        function pad2(n) { return String(n).padStart(2, '0'); }

        function parseDate(str) {
            const parts = str.split('-');
            return { year: parseInt(parts[0]), month: parseInt(parts[1]), day: parseInt(parts[2]) };
        }

        function daysBetween(a, b) {
            const ms = b.getTime() - a.getTime();
            return Math.round(ms / 86400000);
        }

        // Get next occurrence of (month, day) from today
        function nextOccurrence(month, day, today) {
            const y = today.getFullYear();
            let d = new Date(y, month - 1, day);
            if (d < today) d = new Date(y + 1, month - 1, day);
            return d;
        }

        function formatDateShort(dateStr) {
            const p = parseDate(dateStr);
            const d = new Date(p.year, p.month - 1, p.day);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function formatCountdown(days) {
            if (days === 0) return 'Today';
            if (days === 1) return 'Tomorrow';
            if (days < 0) return `${Math.abs(days)}d ago`;
            return `${days}d left`;
        }

        /* ── Render ── */
        function render() {
            const today = new Date();
            today.setHours(0,0,0,0);

            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const activePill = document.querySelector('.pill.active');
            const catFilter = activePill ? activePill.dataset.cat : 'all';

            // Compute stats
            let total = dates.length;
            let upcoming = 0;
            let birthdays = 0;
            let countdownMin = Infinity;
            let nextDateName = '';

            // Annotate each date
            const annotated = dates.map(d => {
                const p = parseDate(d.date);
                const next = nextOccurrence(p.month, p.day, today);
                const diff = daysBetween(today, next);
                const isToday = diff === 0;
                const isPast = diff < 0;
                const cat = d.category || 'other';
                return { ...d, _next: next, _diff: diff, _isToday: isToday, _isPast: isPast, _cat: cat };
            });

            // Stats
            const future = annotated.filter(d => d._diff >= 0 && d._diff <= 30);
            upcoming = future.length;
            birthdays = annotated.filter(d => d._cat === 'birthday').length;

            const closest = annotated.filter(d => d._diff >= 0).sort((a,b) => a._diff - b._diff);
            if (closest.length > 0) {
                countdownMin = closest[0]._diff;
                nextDateName = closest[0].name;
            }

            // Filter
            let filtered = annotated;
            if (search) {
                filtered = filtered.filter(d => d.name.toLowerCase().includes(search));
            }
            if (catFilter !== 'all') {
                filtered = filtered.filter(d => d._cat === catFilter);
            }

            // Sort: upcoming first, then by days
            filtered.sort((a, b) => {
                if (a._isToday && !b._isToday) return -1;
                if (!a._isToday && b._isToday) return 1;
                return a._diff - b._diff;
            });

            // Stats row
            document.getElementById('statsRow').innerHTML = `
                <div class="stat-card"><div class="num">${total}</div><div class="label">Total Dates</div></div>
                <div class="stat-card"><div class="num">${upcoming}</div><div class="label">Upcoming ≤30d</div></div>
                <div class="stat-card"><div class="num">${birthdays}</div><div class="label">Birthdays</div></div>
                <div class="stat-card"><div class="num">${countdownMin < Infinity ? countdownMin : '-'}</div><div class="label">Days Until Next</div></div>
            `;

            // Filter pills
            const cats = ['all', 'birthday', 'anniversary', 'holiday', 'other'];
            const catLabels = { all: 'All', birthday: 'Birthday', anniversary: 'Anniversary', holiday: 'Holiday', other: 'Other' };
            document.getElementById('filterPills').innerHTML = cats.map(c =>
                `<button class="pill${c === catFilter ? ' active' : ''}" data-cat="${c}" onclick="setFilter(this)">${catLabels[c]}</button>`
            ).join('');

            // Count
            document.getElementById('dateCount').textContent = `${filtered.length} of ${total}`;

            // List
            const list = document.getElementById('dateList');
            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="icon">* * *</div><p>No dates found</p></div>`;
                return;
            }

            list.innerHTML = filtered.map(d => {
                const cls = d._isToday ? 'today' : (d._diff >= 0 ? 'upcoming' : 'past');
                const p = parseDate(d.date);
                const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const tagClass = `tag-${d._cat}`;
                const countdownClass = d._diff < 0 ? 'negative' : '';
                const cntStr = formatCountdown(d._diff);
                return `
                    <div class="date-card ${cls}">
                        <div class="day-badge">
                            <span class="month">${monthNames[p.month - 1]}</span>
                            <span class="day">${p.day}</span>
                        </div>
                        <div class="info">
                            <div class="name">${escHtml(d.name)}</div>
                            <div class="desc">${formatDateShort(d.date)}</div>
                            <span class="category-tag ${tagClass}">${catLabels[d._cat]}</span>
                        </div>
                        <div class="meta-right">
                            <div class="countdown ${countdownClass}">${cntStr}</div>
                            <button class="delete-btn" onclick="promptDelete('${d.id}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        /* ── Actions ── */
        function addDate(e) {
            e.preventDefault();
            const name = document.getElementById('newName').value.trim();
            const dateVal = document.getElementById('newDate').value;
            const category = document.getElementById('newCategory').value;
            if (!name || !dateVal) return;
            dates.push({ id: genId(), name, date: dateVal, category });
            saveData();
            document.getElementById('newName').value = '';
            document.getElementById('newDate').value = '';
            render();
            showToast('Date added');
        }

        let pendingDeleteId = null;
        function promptDelete(id) {
            pendingDeleteId = id;
            document.getElementById('confirmTitle').textContent = 'Delete Date';
            const d = dates.find(x => x.id === id);
            document.getElementById('confirmText').textContent = `Delete "${d ? d.name : 'this date'}"? This cannot be undone.`;
            document.getElementById('confirmBtn').textContent = 'Delete';
            document.getElementById('confirmOverlay').classList.add('active');
        }

        function confirmAction() {
            if (pendingDeleteId) {
                dates = dates.filter(d => d.id !== pendingDeleteId);
                saveData();
                render();
                showToast('Date deleted');
            }
            closeConfirm();
        }

        function closeConfirm() {
            pendingDeleteId = null;
            document.getElementById('confirmOverlay').classList.remove('active');
        }

        function setFilter(el) {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        /* ── Export / Import ── */
        function exportData() {
            const blob = new Blob([JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), dates })], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `keydates-export-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.dates && Array.isArray(data.dates)) {
                        // Merge: keep existing, add new ones (dedup by id)
                        const existingIds = new Set(dates.map(d => d.id));
                        const added = [];
                        for (const nd of data.dates) {
                            if (nd.id && nd.name && nd.date) {
                                if (!existingIds.has(nd.id)) {
                                    dates.push(nd);
                                    existingIds.add(nd.id);
                                    added.push(nd.name);
                                }
                            }
                        }
                        saveData();
                        render();
                        showToast(added.length > 0 ? `Imported ${added.length} dates` : 'No new dates to import');
                    }
                } catch(e) {
                    showToast('Invalid file');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        /* ── Toast ── */
        function showToast(msg) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            c.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            }, 2000);
        }

        /* ── Init ── */
        loadData();
        render();

        // Close modal on overlay click
        document.getElementById('confirmOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeConfirm();
        });
    </script>
</body>
</html>
