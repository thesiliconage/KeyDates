<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'">
    <title>KeyDates</title>
    <style>
        @font-face{font-family:'Inter';font-style:normal;font-weight:200;font-display:swap;src:url(fonts/inter-200.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:300;font-display:swap;src:url(fonts/inter-300.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/inter-400.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url(fonts/inter-500.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/inter-600.woff2) format('woff2')}
        @font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url(fonts/inter-700.woff2) format('woff2')}
    </style>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #faf5f0;
            --card: #fff;
            --card-border: #eee5dc;
            --ink: #3d322a;
            --muted: #a09080;
            --mono: 'JetBrains Mono', monospace;
            --font: 'Inter', -apple-system, sans-serif;
            --primary: #e8a87c;
            --primary-light: #f5e6d8;
            --soft-green: #a8d5ba;
            --soft-blue: #b8d4e8;
            --soft-pink: #e8b8c8;
            --shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        html { font-size: 16px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 500;
            color: var(--ink);
            letter-spacing: -0.02em;
            margin-bottom: 32px;
            text-align: center;
        }
        .container {
            display: flex;
            gap: 28px;
            width: 100%;
            max-width: 820px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ── Left: Countdown Cards ── */
        .left-panel {
            flex: 1;
            min-width: 280px;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .cd-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 22px 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        .cd-card:hover {
            transform: translateY(-2px);
        }
        .cd-card .cd-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .cd-card .cd-count {
            font-family: var(--mono);
            font-size: 36px;
            font-weight: 300;
            color: var(--ink);
            line-height: 1.2;
        }
        .cd-card .cd-count .unit {
            font-size: 16px;
            font-weight: 400;
            color: var(--muted);
        }
        .cd-card .cd-date {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }
        .cd-card.cd-0 { border-left: 4px solid var(--primary); }
        .cd-card.cd-1 { border-left: 4px solid var(--soft-blue); }
        .cd-card.cd-2 { border-left: 4px solid var(--soft-pink); }

        /* ── Right: Calendar ── */
        .right-panel {
            flex: 1;
            min-width: 280px;
            max-width: 380px;
        }
        .cal-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 22px;
            box-shadow: var(--shadow);
        }
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .cal-header .cal-month-year {
            font-size: 16px;
            font-weight: 500;
        }
        .cal-header .cal-nav {
            display: flex;
            gap: 6px;
        }
        .cal-header .cal-nav button {
            background: none;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            color: var(--muted);
            font-family: var(--font);
            font-size: 16px;
            transition: all 0.15s;
        }
        .cal-header .cal-nav button:hover {
            background: var(--primary-light);
            color: var(--ink);
        }

        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 6px;
        }
        .cal-weekdays .wd {
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            padding: 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .cal-days .cal-day {
            text-align: center;
            padding: 8px 0;
            font-size: 13px;
            font-weight: 400;
            color: var(--ink);
            border-radius: 8px;
            transition: background 0.1s;
            cursor: default;
        }
        .cal-days .cal-day.other-month {
            color: #d5cdc5;
        }
        .cal-days .cal-day.today {
            background: var(--primary-light);
            font-weight: 600;
            color: var(--primary);
        }
        .cal-days .cal-day.highlight {
            background: var(--soft-green);
            color: #fff;
            font-weight: 600;
        }
        .cal-days .cal-day.highlight-1 {
            background: var(--soft-blue);
            color: #fff;
            font-weight: 600;
        }
        .cal-days .cal-day.highlight-2 {
            background: var(--soft-pink);
            color: #fff;
            font-weight: 600;
        }
        .cal-legend {
            display: flex;
            gap: 16px;
            margin-top: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .cal-legend .leg-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--muted);
        }
        .cal-legend .leg-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .cal-legend .leg-dot.dot-0 { background: var(--soft-green); }
        .cal-legend .leg-dot.dot-1 { background: var(--soft-blue); }
        .cal-legend .leg-dot.dot-2 { background: var(--soft-pink); }

        @media (max-width: 660px) {
            .container { flex-direction: column; align-items: center; }
            .left-panel, .right-panel { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="page-title">Key Dates</div>

    <div class="container">
        <!-- Left: Countdown -->
        <div class="left-panel" id="cdPanel"></div>

        <!-- Right: Calendar -->
        <div class="right-panel">
            <div class="cal-card">
                <div class="cal-header">
                    <span class="cal-month-year" id="calMonthYear"></span>
                    <div class="cal-nav">
                        <button id="calPrev">&larr;</button>
                        <button id="calNext">&rarr;</button>
                    </div>
                </div>
                <div class="cal-weekdays">
                    <span class="wd">S</span><span class="wd">M</span><span class="wd">T</span>
                    <span class="wd">W</span><span class="wd">T</span><span class="wd">F</span>
                    <span class="wd">S</span>
                </div>
                <div class="cal-days" id="calDays"></div>
                <div class="cal-legend" id="calLegend"></div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ── Obfuscated date data ──
        // Actual dates are encoded to avoid plaintext exposure in source.
        // Encoding: each date = [yearOffsetFrom2026, month, day]
        // keyDates[0] = 6月9日, keyDates[1] = 7月7日, keyDates[2] = 10月6日
        var _d = [
            [0, 6, 9],
            [0, 7, 7],
            [0, 10, 6]
        ];

        var keyDates = _d.map(function(a) {
            return { year: 2026 + a[0], month: a[1], day: a[2] };
        });

        var labels = ['Date A', 'Date B', 'Date C'];
        var colors = ['highlight', 'highlight-1', 'highlight-2'];
        var dotColors = ['dot-0', 'dot-1', 'dot-2'];

        // ── Helpers ──
        var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        var monthShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        function daysBetween(from, to) {
            var ms = to.getTime() - from.getTime();
            return Math.round(ms / 86400000);
        }

        function nextOccurrence(kd, today) {
            var d = new Date(today.getFullYear(), kd.month - 1, kd.day);
            if (d < today) d = new Date(today.getFullYear() + 1, kd.month - 1, kd.day);
            return d;
        }

        // ── Render Countdowns ──
        function renderCountdowns() {
            var today = new Date();
            today.setHours(0,0,0,0);

            var html = '';
            for (var i = 0; i < keyDates.length; i++) {
                var kd = keyDates[i];
                var next = nextOccurrence(kd, today);
                var diff = daysBetween(today, next);
                var diffStr, unit;
                if (diff === 0) {
                    diffStr = 'Today';
                    unit = '';
                } else if (diff === 1) {
                    diffStr = '1';
                    unit = 'day';
                } else {
                    diffStr = String(diff);
                    unit = 'days';
                }
                var dateStr = monthShort[kd.month - 1] + ' ' + kd.day;
                html +=
                    '<div class="cd-card cd-' + i + '">' +
                        '<div class="cd-label">' + labels[i] + '</div>' +
                        '<div class="cd-count">' + diffStr + ' <span class="unit">' + unit + '</span></div>' +
                        '<div class="cd-date">' + dateStr + '</div>' +
                    '</div>';
            }
            document.getElementById('cdPanel').innerHTML = html;
        }

        // ── Calendar ──
        var calView = { year: 2026, month: 5 }; // June 2026 (0-indexed)

        function renderCalendar() {
            var y = calView.year;
            var m = calView.month; // 0-indexed

            document.getElementById('calMonthYear').textContent = monthNames[m] + ' ' + y;

            var firstDay = new Date(y, m, 1).getDay(); // 0=Sun
            var daysInMonth = new Date(y, m + 1, 0).getDate();
            var daysInPrev = new Date(y, m, 0).getDate();

            var today = new Date();
            today.setHours(0,0,0,0);

            // Build highlight map: month-day -> highlight class
            var hl = {};
            for (var i = 0; i < keyDates.length; i++) {
                var kd = keyDates[i];
                // Show highlights for current and future occurrences in this calendar view
                var key = (kd.month - 1) + '-' + kd.day;
                if (!hl[key]) hl[key] = colors[i];
            }

            var html = '';
            // Prev month days
            var start = firstDay;
            for (var p = daysInPrev - start + 1; p <= daysInPrev; p++) {
                html += '<div class="cal-day other-month">' + p + '</div>';
            }
            // Current month days
            for (var d = 1; d <= daysInMonth; d++) {
                var cls = 'cal-day';
                var date = new Date(y, m, d);
                // Check if today
                if (date.getTime() === today.getTime()) cls += ' today';
                // Check highlight
                var hkey = m + '-' + d;
                if (hl[hkey]) cls += ' ' + hl[hkey];
                html += '<div class="' + cls + '">' + d + '</div>';
            }
            // Next month padding (fill remaining cells to complete 42)
            var totalCells = start + daysInMonth;
            var rem = (7 - (totalCells % 7)) % 7;
            for (var n = 1; n <= rem; n++) {
                html += '<div class="cal-day other-month">' + n + '</div>';
            }
            document.getElementById('calDays').innerHTML = html;

            // Legend
            var legendHtml = '';
            for (var i = 0; i < keyDates.length; i++) {
                var kd = keyDates[i];
                legendHtml +=
                    '<div class="leg-item">' +
                        '<span class="leg-dot ' + dotColors[i] + '"></span>' +
                        labels[i] + ': ' + monthShort[kd.month - 1] + ' ' + kd.day +
                    '</div>';
            }
            document.getElementById('calLegend').innerHTML = legendHtml;
        }

        // ── Nav ──
        document.getElementById('calPrev').addEventListener('click', function() {
            calView.month--;
            if (calView.month < 0) { calView.month = 11; calView.year--; }
            renderCalendar();
        });
        document.getElementById('calNext').addEventListener('click', function() {
            calView.month++;
            if (calView.month > 11) { calView.month = 0; calView.year++; }
            renderCalendar();
        });

        // ── Init ──
        renderCountdowns();
        renderCalendar();
    })();
    </script>
</body>
</html>
